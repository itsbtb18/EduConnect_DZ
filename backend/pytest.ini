[pytest]
DJANGO_SETTINGS_MODULE = ilmi.settings.development
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --cov=apps --cov=core --cov-report=term-missing --cov-report=html:htmlcov --cov-fail-under=40
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    celery: marks tests requiring celery
