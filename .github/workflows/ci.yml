name: CI — ILMI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Backend Tests (Django)
  # ──────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_ilmi
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: ilmi.settings.development
          DB_NAME: test_ilmi
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: ci-test-secret-key-not-for-production
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: ilmi.settings.development
          DB_NAME: test_ilmi
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: ci-test-secret-key-not-for-production
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python -m pytest --tb=short -q --cov=apps --cov=core --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ──────────────────────────────────────
  # Admin Panel (React) — Lint, Test, Build
  # ──────────────────────────────────────
  admin-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: |
          cd admin
          npm ci

      - name: Lint
        run: |
          cd admin
          npx eslint src/ --max-warnings=0 || true

      - name: Type check
        run: |
          cd admin
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd admin
          npx vitest run --reporter=verbose

      - name: Build production bundle
        run: |
          cd admin
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: admin/dist/

  # ──────────────────────────────────────
  # Flutter Analysis & Tests
  # ──────────────────────────────────────
  flutter-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Analyze code
        run: |
          cd mobile
          flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: |
          cd mobile
          flutter test --coverage

      - name: Upload Flutter coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info

  # ──────────────────────────────────────
  # Docker Build Check
  # ──────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, admin-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ilmi-api:test ./backend

      - name: Build admin image
        run: docker build -t ilmi-admin:test ./admin
